<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel</title>
    <style>
        /* Base styles for the hero section */
        .hero {
            background: url('hero-image.jpg') no-repeat center center;
            background-size: cover;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* Responsive styles for mobile screens */
        @media (max-width: 768px) {
            .hero {
                height: 250px;
                font-size: 1.2em;
            }
            .grid {
                grid-template-columns: repeat(1, 1fr);
            }
            .table {
                font-size: 0.9em;
            }
            footer {
                text-align: center;
            }
        }

        /* Base styles for grid layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1em;
        }

        /* Base styles for table */
        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th, .table td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        /* Footer styles */
        footer {
            background-color: #333;
            color: white;
            padding: 1em;
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1>Welcome to Our Hotel</h1>
    </header>

    <main>
        <section class="grid">
            <!-- Add your grid items here -->
        </section>

        <section>
            <table class="table">
                <tr>
                    <th>Service</th>
                    <th>Price</th>
                </tr>
                <tr>
                    <td>Room Service</td>
                    <td>$10</td>
                </tr>
                <tr>
                    <td>Spa</td>
                    <td>$50</td>
                </tr>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Our Hotel</p>
    </footer>
</body>
</html>
